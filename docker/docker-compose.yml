version: '3.8'

services:
  raccoon-edu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: raccoon-edu
    ports:
      - "5300:5300"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - raccoon-network

networks:
  raccoon-network:
    driver: bridge